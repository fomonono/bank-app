<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CDK Bank Accounts</title>
    <link rel="stylesheet" href="../css/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./home.html">CDK Bank</a>
      <nav class="site-nav" aria-label="Main navigation">
        <a href="./home.html">Dashboard</a>
        <a class="active" href="./accounts.html">Accounts</a>
        <a href="./transaction-history.html">History</a>
      </nav>
    </header>

    <main class="page-shell">
      <section class="section">
        <div class="section-header">
          <div>
            <p class="eyebrow">Customers</p>
            <h1>Accounts</h1>
          </div>
          <a class="btn btn-primary" href="./home.html">New action</a>
        </div>

        <div class="summary-grid">
          <div class="summary-card">
            <span>Total accounts</span>
            <strong id="accountCount">0</strong>
          </div>
          <div class="summary-card">
            <span>Total balance</span>
            <strong id="totalBalance">$0</strong>
          </div>
        </div>

        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Account number</th>
                <th>Phone</th>
                <th>Type</th>
                <th>Balance</th>
                <th>Created</th>
                <th>Transactions</th>
              </tr>
            </thead>
            <tbody id="accountsTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      CDK Bank demo for learning full-stack web development.
    </footer>

    <script src="../js/shared/api.js"></script>
    <script src="../js/shared/dom.js"></script>
    <script src="../js/pages/accounts.js"></script>
  </body>
</html>
